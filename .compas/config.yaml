# Development config for compas
# Uses a local state directory to avoid conflicting with production
default_workdir: ..
state_dir: state
poll_interval_secs: 2

orchestration:
  max_concurrent_triggers: 4
  max_triggers_per_agent: 1
  trigger_intents:
    - dispatch
    - handoff
    - changes-requested
  execution_timeout_secs: 1000
  ping_timeout_secs: 30

database:
  max_connections: 8
  min_connections: 2
  acquire_timeout_ms: 15000

agents:
  - alias: dev
    backend: claude
    safety_mode: auto_approve
    model: claude-sonnet-4-6
    prompt: >
      You are a development agent for compas.
      Follow AGENTS.md. Run make verify before submitting.
