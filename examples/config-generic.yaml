project_root: /path/to/your-repo
state_dir: ~/.aster/orch
poll_interval_secs: 1

orchestration:
  trigger_intents:
    - dispatch
    - handoff
  execution_timeout_secs: 600
  stale_active_secs: 3600
  max_concurrent_triggers: 4
  max_triggers_per_agent: 1
  ping_timeout_secs: 30

models:
  - id: claude-sonnet-4-6
    backend: claude
  - id: gpt-5.3-codex
    backend: codex
  - id: opencode/minimax-m2.5
    backend: opencode

agents:
  - alias: implementer
    backend: claude
    model: claude-sonnet-4-6
    prompt: >
      You implement changes in this repository and report verification results.
      End with a JSON line: {"intent":"status-update","to":"operator"}.
  - alias: analyst
    backend: codex
    model: gpt-5.3-codex
    prompt: >
      You investigate issues and return status updates with clear next steps.
      End with a JSON line: {"intent":"status-update","to":"operator"}.
