target_repo_root: /path/to/your-repo
state_dir: ~/.aster-orch/state
poll_interval_secs: 1

# Desktop notifications (macOS only, requires worker restart to toggle)
# notifications:
#   desktop: false

orchestration:
  trigger_intents:
    - dispatch
    - handoff
  execution_timeout_secs: 600
  stale_active_secs: 3600
  max_concurrent_triggers: 4
  max_triggers_per_agent: 1
  ping_timeout_secs: 30
  # log_retention_count: 100      # Max execution log files to retain (default: 100)

models:
  - id: claude-sonnet-4-6
    backend: claude
  - id: gpt-5.3-codex
    backend: codex
  - id: opencode/minimax-m2.5
    backend: opencode

agents:
  - alias: implementer
    backend: claude
    model: claude-sonnet-4-6
    # workdir: /path/to/other-repo    # Per-agent repo override (default: target_repo_root)
    # workspace: worktree             # "worktree" for git isolation, "shared" (default)
    # max_retries: 0                  # Auto-retry on transient failure (0 = disabled)
    # retry_backoff_secs: 30          # Base delay between retries (doubles each attempt)
    # Auto-handoff: route agent output to another agent on completion.
    # handoff:
    #   on_response: reviewer           # single target
    #   # on_response: [reviewer, reviewer-2]  # fan-out to multiple reviewers
    #   handoff_prompt: |               # custom instructions for the receiving agent
    #     Review for correctness, test coverage, and AGENTS.md compliance.
    #   max_chain_depth: 3              # safety limit (default: 3)
    prompt: >
      You implement changes in this repository and report verification results.
  - alias: analyst
    backend: codex
    model: gpt-5.3-codex
    prompt: >
      You investigate issues and return status updates with clear next steps.

  # Example: agent working in a different repository
  # - alias: infra-dev
  #   backend: claude
  #   model: claude-sonnet-4-6
  #   workdir: /path/to/infra-repo     # Works in a different repo than target_repo_root
  #   workspace: worktree              # Each thread gets its own worktree
  #   prompt: "You work on infrastructure..."
