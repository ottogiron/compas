default_workdir: /path/to/your-repo
state_dir: ~/.compas/state
poll_interval_secs: 1

# Desktop notifications (macOS only, requires worker restart to toggle)
# notifications:
#   desktop: false

orchestration:
  trigger_intents:
    - dispatch
    - handoff
  execution_timeout_secs: 600
  stale_active_secs: 3600
  max_concurrent_triggers: 4
  max_triggers_per_agent: 1
  ping_timeout_secs: 30
  # log_retention_count: 100      # Max execution log files to retain (default: 100)

models:
  - id: claude-sonnet-4-6
    backend: claude
  - id: gpt-5.3-codex
    backend: codex
  - id: opencode/minimax-m2.5
    backend: opencode

agents:
  - alias: implementer
    backend: claude
    model: claude-sonnet-4-6
    # workdir: /path/to/other-repo    # Per-agent workdir override (default: default_workdir)
    # workspace: worktree             # "worktree" for git isolation, "shared" (default)
    # max_retries: 0                  # Auto-retry on transient failure (0 = disabled)
    # retry_backoff_secs: 30          # Base delay between retries (doubles each attempt)
    # Auto-handoff: route agent output to another agent on completion.
    # handoff:
    #   on_response: reviewer           # single target
    #   # on_response: [reviewer, reviewer-2]  # fan-out to multiple reviewers
    #   handoff_prompt: |               # custom instructions for the receiving agent
    #     Review for correctness, test coverage, and AGENTS.md compliance.
    #   max_chain_depth: 3              # safety limit (default: 3)
    prompt: >
      You implement changes in this repository and report verification results.
  - alias: analyst
    backend: codex
    model: gpt-5.3-codex
    prompt: >
      You investigate issues and return status updates with clear next steps.

  # Example: agent working in a different repository
  # - alias: infra-dev
  #   backend: claude
  #   model: claude-sonnet-4-6
  #   workdir: /path/to/infra-repo     # Works in a different repo than default_workdir
  #   workspace: worktree              # Each thread gets its own worktree
  #   prompt: "You work on infrastructure..."

  # Example: agent using a custom (generic) backend
  - alias: aider-dev
    backend: aider
    prompt: >
      You implement changes using aider. Follow the project's coding standards.

# ---------------------------------------------------------------------------
# Custom backend definitions
# ---------------------------------------------------------------------------
# Define CLI-based backends entirely in YAML. Any tool that accepts a prompt
# and returns text can be wired in. Agents reference these by name in their
# `backend:` field.
#
# Template variables available in `args`:
#   {{instruction}}  — the dispatch message / task text
#   {{model}}        — agent's configured model (omitted when absent)
#   {{session_id}}   — previous session ID for resume (omitted when absent)

backend_definitions:
  # Minimal: aider with plaintext output (raw stdout = result)
  - name: aider
    command: aider
    args: ["--message", "{{instruction}}"]

  # Full-featured: custom tool with JSON output, session resume, custom ping,
  # and environment variable stripping.
  # - name: my-tool
  #   command: /usr/local/bin/my-tool
  #   args: ["--prompt", "{{instruction}}", "--model", "{{model}}"]
  #   resume:
  #     flag: "--resume"
  #     session_id_arg: "{{session_id}}"
  #   output:
  #     format: json              # plaintext (default) | json | jsonl
  #     result_field: data.text   # dot-path into JSON response
  #     session_id_field: sid     # extract session ID for resume
  #   ping:
  #     command: my-tool
  #     args: ["--health"]
  #   env_remove:
  #     - ANTHROPIC_API_KEY       # strip keys the tool shouldn't see
