project_root: /path/to/your-repo
state_dir: ~/.aster/orch
db_path: ~/.aster/orch/jobs.sqlite
poll_interval_secs: 1

orchestration:
  trigger_intents:
    - dispatch
    - handoff
    - changes-requested
  execution_timeout_secs: 600
  max_concurrent_triggers: 4
  max_triggers_per_agent: 1
  ping_timeout_secs: 30

models:
  - id: claude-sonnet-4-6
    backend: claude
  - id: gpt-5.3-codex
    backend: codex

agents:
  - alias: implementer
    identity: Claude
    backend: claude
    model: claude-sonnet-4-6
    prompt: >
      You implement changes in this repository and report verification results.
      End with a JSON line: {"intent":"review-request","to":"operator"}.
  - alias: reviewer
    identity: Codex
    backend: codex
    model: gpt-5.3-codex
    prompt: >
      You review diffs for bugs, regressions, and missing tests.
      End with a JSON line: {"intent":"review-request","to":"operator"}.
